<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Panel de pedidos — Catálogo Bimbo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css?v=14" />
</head>
<body>

  <!-- Login -->
  <div id="loginView" class="admin-login-screen">
    <div class="login-card">
      <span class="hero-eyebrow">Panel Bimbo</span>
      <h1 class="login-title">Acceso admin</h1>
      <input class="form-field" id="loginEmail" type="email" placeholder="Correo" autocomplete="username" />
      <input class="form-field" id="loginPassword" type="password" placeholder="Contraseña" autocomplete="current-password" />
      <p id="loginError" class="error-text hidden"></p>
      <button class="btn-primary" id="loginBtn">Entrar</button>
      <p class="hint-text"><a href="index.html">← Volver al catálogo</a></p>
    </div>
  </div>

  <!-- Panel -->
  <div id="ordersView" class="hidden">
    <header class="topbar">
      <div class="topbar-inner">
        <span class="brand">Panel <strong>Bimbo</strong></span>
        <div id="profileWrap" class="profile-wrap hidden">
          <button id="profileBtn" class="profile-btn" aria-label="Perfil">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          </button>
          <div id="profileDropdown" class="profile-dropdown hidden">
            <div class="profile-email" id="profileEmail"></div>
            <a href="index.html" id="profileLinkCatalogo">Catálogo</a>
            <button id="profileLogoutBtn" class="danger">Cerrar sesión</button>
          </div>
        </div>
      </div>
    </header>
    <main class="view">
      <div id="newOrderBanner" class="new-order-banner hidden">Nuevo pedido recibido</div>

      <div class="admin-tabs">
        <button class="auth-tab active" data-panel="pedidos">Pedidos</button>
        <button class="auth-tab" data-panel="usuarios">
          Usuarios <span id="pendientesBadge" class="cart-badge hidden" style="position:static; margin-left:4px;">0</span>
        </button>
        <button class="auth-tab" data-panel="productos">Productos</button>
      </div>

      <div id="panelPedidos">
        <div class="orders-toolbar">
          <h1 class="orders-title">Pedidos</h1>
          <div class="orders-filter" id="ordersFilter">
            <button class="chip active" data-estado="todos">Todos</button>
            <button class="chip" data-estado="nuevo">Nuevos</button>
            <button class="chip" data-estado="visto">Vistos</button>
            <button class="chip" data-estado="completado">Completados</button>
          </div>
        </div>
        <div class="search-toolbar">
          <input class="form-field" id="pedidosBusqueda" placeholder="Buscar por nombre, teléfono o correo..." />
          <select class="form-field" id="pedidosFiltroEstadoUS">
            <option value="">Estado (todos)</option>
          </select>
          <input class="form-field" id="pedidosFiltroZip" placeholder="ZIP" inputmode="numeric" maxlength="5" />
        </div>
        <div id="ordersWrap"></div>
      </div>

      <div id="panelUsuarios" class="hidden">
        <div class="orders-toolbar">
          <h1 class="orders-title">Usuarios</h1>
          <div class="orders-filter" id="usuariosFilter">
            <button class="chip active" data-filtro="todos">Todos</button>
            <button class="chip" data-filtro="pendiente">Pendientes</button>
            <button class="chip" data-filtro="aprobado">Aprobados</button>
          </div>
        </div>
        <div class="search-toolbar">
          <input class="form-field" id="usuariosBusqueda" placeholder="Buscar por nombre, teléfono o correo..." />
          <select class="form-field" id="usuariosFiltroEstadoUS">
            <option value="">Estado (todos)</option>
          </select>
          <input class="form-field" id="usuariosFiltroZip" placeholder="ZIP" inputmode="numeric" maxlength="5" />
        </div>
        <div id="usuariosWrap"></div>
      </div>

      <div id="panelProductos" class="hidden">
        <div class="orders-toolbar">
          <h1 class="orders-title">Productos</h1>
        </div>
        <div class="search-toolbar">
          <input class="form-field" id="productosBusqueda" placeholder="Buscar por nombre o UPC..." />
        </div>
        <p class="hint-text">Edita precio, piezas por caja o cajas por tarima y da clic en Guardar. Los cambios se reflejan de inmediato en el catálogo.</p>
        <div id="productosWrap"></div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js?v=13"></script>
  <script src="profile-menu.js?v=12"></script>
  <script src="admin.js?v=14"></script>
</body>
</html>
