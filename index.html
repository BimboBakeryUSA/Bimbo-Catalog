<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Catálogo Bimbo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css?v=2" />
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <span class="brand">Catálogo <strong>Bimbo</strong></span>
      <button id="cartBtn" class="cart-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
        <span>Mi pedido</span>
        <span id="cartBadge" class="cart-badge hidden">0</span>
      </button>
    </div>
  </header>

  <main id="catalogView" class="view">
    <section class="hero">
      <span class="hero-eyebrow">Recién horneado, todos los días</span>
      <h1>Tu pedido Bimbo,<br />a un clic de distancia</h1>
    </section>

    <div class="toolbar">
      <div class="search-row">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input id="searchInput" type="text" placeholder="Buscar producto..." />
      </div>
      <div id="chipsWrap" class="chips-wrap"></div>
    </div>

    <div id="categoriesWrap"></div>
  </main>

  <!-- Modal: detalle de producto -->
  <div id="productModal" class="modal hidden">
    <div class="modal-card">
      <button class="modal-close" data-close="productModal">✕</button>
      <div id="productModalBody"></div>
    </div>
  </div>

  <!-- Modal: carrito / checkout -->
  <div id="cartModal" class="modal hidden">
    <div class="modal-card">
      <button class="modal-close" data-close="cartModal">✕</button>
      <div id="cartModalBody"></div>
    </div>
  </div>

  <!-- EmailJS (envío de correo sin backend) -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="app.js?v=2"></script>
</body>
</html>
